name: Patch dashboard distance fields and delete actions

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/patch-dashboard.yml'
      - '.dashboard-patch-trigger'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch index.html
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          def sub_once(pattern, replacement, label, flags=0):
              global text
              text, count = re.subn(pattern, replacement, text, count=1, flags=flags)
              if count != 1:
                  raise SystemExit(f'Patch failed at: {label} (matches: {count})')

          sub_once(
              r'(\.card-actions\s*\{\s*display:\s*grid;\s*grid-template-columns:)\s*minmax\(0,\s*1fr\)\s+auto\s+auto;',
              r'\1 minmax(0, 1fr) auto auto auto;',
              'desktop card columns', re.S
          )

          sub_once(
              r'(\.status-select\s*\{\s*min-width:\s*0;\s*\})',
              r'''\1

    .delete-btn {
      min-width: 44px;
      padding-inline: 11px;
      border-color: #efc7cc;
      background: #fff8f8;
      color: var(--bad);
    }

    .delete-btn:hover { background: var(--bad-soft); }''',
              'delete css'
          )

          text = text.replace(
              '.card-actions { grid-template-columns: 1fr 1fr; }',
              '.card-actions { grid-template-columns: 1fr 1fr 1fr; }',
              1
          )

          sub_once(
              r'(\$\{listingLink\}\s*</div>)',
              r'''${listingLink}

            <button class="secondary-btn delete-btn" type="button" data-action="delete-property" data-id="${property.id}" aria-label="Wohnung endgültig löschen" title="Wohnung endgültig löschen">🗑️</button>
          </div>''',
              'property delete button'
          )

          sub_once(
              r'(\$\{projectLink\}\$\{sourceLink\}\s*</div>)',
              r'''${projectLink}${sourceLink}
            <button class="secondary-btn delete-btn" type="button" data-action="delete-project" data-id="${project.id}" aria-label="Pipeline-Projekt endgültig löschen" title="Pipeline-Projekt endgültig löschen">🗑️</button>
          </div>''',
              'pipeline delete button'
          )

          sub_once(
              r'    function commuteHtml\(property\) \{\n      const a = Number\([^\n]+\);\n      const b = Number\([^\n]+\);',
              '''    function firstPositiveNumber(...values) {
      for (const value of values) {
        if (value === null || value === undefined || value === "") continue;
        const number = Number(value);
        if (Number.isFinite(number) && number > 0) return Math.round(number);
      }
      return null;
    }

    function commuteValues(item) {
      return {
        othmarsingen: firstPositiveNumber(item._drive_minutes_othmarsingen, item.drive_minutes_othmarsingen, item.travel_time_othmarsingen_minutes, item.travel_minutes_othmarsingen, item.drive_time_othmarsingen_minutes, item.othmarsingen_minutes),
        duebendorf: firstPositiveNumber(item._drive_minutes_duebendorf, item.drive_minutes_duebendorf, item.travel_time_duebendorf_minutes, item.travel_minutes_duebendorf, item.drive_time_duebendorf_minutes, item.duebendorf_minutes)
      };
    }

    function commuteHtml(property) {
      const { othmarsingen: a, duebendorf: b } = commuteValues(property);''',
              'commute aliases'
          )

          sub_once(
              r'        const importedA = Number\([^\n]+\);\n        const importedB = Number\([^\n]+\);\n        if \(Number\.isFinite\(importedA\) && importedA > 0 && Number\.isFinite\(importedB\) && importedB > 0\) \{',
              '''        const { othmarsingen: importedA, duebendorf: importedB } = commuteValues(property);
        if (importedA && importedB) {''',
              'commute calculation'
          )

          old = 'drive_minutes_othmarsingen: item.drive_minutes_othmarsingen ?? item.othmarsingen_minutes ?? null,\n        drive_minutes_duebendorf: item.drive_minutes_duebendorf ?? item.duebendorf_minutes ?? null,'
          new = 'drive_minutes_othmarsingen: firstPositiveNumber(item.drive_minutes_othmarsingen, item.travel_time_othmarsingen_minutes, item.travel_minutes_othmarsingen, item.drive_time_othmarsingen_minutes, item.othmarsingen_minutes),\n        drive_minutes_duebendorf: firstPositiveNumber(item.drive_minutes_duebendorf, item.travel_time_duebendorf_minutes, item.travel_minutes_duebendorf, item.drive_time_duebendorf_minutes, item.duebendorf_minutes),'
          count = text.count(old)
          if count != 2:
              raise SystemExit(f'Patch failed at import mappings (matches: {count})')
          text = text.replace(old, new)

          sub_once(
              r'    function slugify\(value\) \{',
              '''    async function deleteProperty(propertyId) {
      const property = state.properties.find(item => item.id === propertyId);
      const label = property?.title || "diesen Eintrag";
      if (!window.confirm(`„${label}“ wirklich endgültig löschen?\\n\\nBewertungen, Notizen und Favoriten werden ebenfalls entfernt.`)) return;

      setLoading(true);
      try {
        for (const table of ["property_votes", "property_notes", "property_favorites"]) {
          const { error } = await db.from(table).delete().eq("property_id", propertyId);
          if (error) throw error;
        }
        const { error } = await db.from("properties").delete().eq("id", propertyId);
        if (error) throw error;

        state.properties = state.properties.filter(item => item.id !== propertyId);
        state.votes = state.votes.filter(item => item.property_id !== propertyId);
        state.notes = state.notes.filter(item => item.property_id !== propertyId);
        state.favorites = state.favorites.filter(item => item.property_id !== propertyId);
        applyFilters();
        showToast("Wohnung endgültig gelöscht");
      } finally {
        setLoading(false);
      }
    }

    async function deletePipelineProject(projectId) {
      const project = state.pipelineProjects.find(item => item.id === projectId);
      const label = project?.project_name || "dieses Pipeline-Projekt";
      if (!window.confirm(`„${label}“ wirklich endgültig löschen?`)) return;

      setLoading(true);
      try {
        const { error } = await db.from("pipeline_projects").delete().eq("id", projectId);
        if (error) throw error;
        state.pipelineProjects = state.pipelineProjects.filter(item => item.id !== projectId);
        applyFilters();
        showToast("Pipeline-Projekt endgültig gelöscht");
      } finally {
        setLoading(false);
      }
    }

    function slugify(value) {''',
              'delete functions'
          )

          sub_once(
              r'(        \} else if \(action === "locate"\) \{\n          focusItem\(propertyId\);\n          window\.scrollTo\(\{ top: 0, behavior: "smooth" \}\);\n        \})',
              r'''\1 else if (action === "delete-property") {
          await deleteProperty(propertyId);
        } else if (action === "delete-project") {
          await deletePipelineProject(propertyId);
        }''',
              'delete click handlers'
          )

          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate and commit
        run: |
          git diff --check
          grep -q 'data-action="delete-property"' index.html
          grep -q 'function commuteValues' index.html
          git config user.name "ChatGPT Dashboard Bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          git commit -m "Fix distance handling and add delete actions"
          git push
